<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Widget</title>

  <!-- Prevent browser caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="stylesheet" href="css/style.css?v=2.1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <script src="js/script.js?v=2.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<!-- The agent UI will be generated here by JavaScript -->
<div id="chat-widget"></div>
<script>
   // Fetch the args data from the local JSON file
  fetch('./data/args.json')
    .then(response => response.json())  // Parse the JSON response
    .then(args => {
      // Pass the loaded args to the renderChatWidget function
      renderChatWidget(args);
    })
    .catch(error => {
      console.error('Error loading args.json:', error);
    });
    // Listen for messages from iframe
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'diagram-json') {
        latestDiagramJson = event.data.payload;
        console.log('Chat widget received diagram JSON:');
        //console.log('Chat widget received diagram JSON:', latestDiagramJson);
      }
      if (event.data?.type === 'session-id') {
        sid = event.data.payload;
        console.log('Chat widget received session id', sid);
      }
    });
</script>
</body>
</html>
